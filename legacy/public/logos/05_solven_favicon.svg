<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Solven">
  <title>Solven — Favicon / App Icon</title>
  <desc>Minimal mark for browser tabs and app icons: the v notch on a charcoal square.</desc>

  <!-- Charcoal background square -->
  <rect x="0" y="0" width="64" height="64" rx="8" fill="#2A2A28"/>

  <!-- Sage v notch, scaled and centred -->
  <path d="M 18 22 L 32 44 L 46 22 L 42 22 L 32 39 L 22 22 Z" fill="#8FA68A"/>
</svg>
