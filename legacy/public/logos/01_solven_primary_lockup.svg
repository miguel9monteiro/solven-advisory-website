<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" role="img" aria-label="Solven Advisory">
  <title>Solven Advisory — Primary Lockup</title>
  <desc>Solven wordmark in Georgia serif, charcoal with a sage v notch, ADVISORY designator centred beneath.</desc>

  <!-- Wordmark: Solven -->
  <g font-family="Georgia, 'Times New Roman', serif" font-weight="400" fill="#2A2A28">
    <text x="170" y="80" font-size="64">S</text>
    <text x="208" y="80" font-size="64">o</text>
    <text x="248" y="80" font-size="64">l</text>
    <!-- Sage v notch -->
    <path d="M 270 44 L 290 80 L 310 44 L 304 44 L 290 70 L 276 44 Z" fill="#6B8068"/>
    <text x="312" y="80" font-size="64">e</text>
    <text x="349" y="80" font-size="64">n</text>
  </g>

  <!-- ADVISORY designator — centred under the wordmark (centre x = 300) -->
  <text x="300" y="115"
        text-anchor="middle"
        font-family="Calibri, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="11"
        fill="#6B8068"
        letter-spacing="3.52">A D V I S O R Y</text>
</svg>
