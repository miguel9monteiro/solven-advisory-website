<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" role="img" aria-label="Solven Advisory (reversed)">
  <title>Solven Advisory — Reversed Lockup</title>
  <desc>Solven wordmark on a deep charcoal background, bone-white type with a sage v notch, ADVISORY centred beneath.</desc>

  <!-- Dark background -->
  <rect x="0" y="0" width="600" height="160" fill="#1F2420"/>

  <!-- Wordmark: Solven -->
  <g font-family="Georgia, 'Times New Roman', serif" font-weight="400" fill="#F4F2EB">
    <text x="170" y="80" font-size="64">S</text>
    <text x="208" y="80" font-size="64">o</text>
    <text x="248" y="80" font-size="64">l</text>
    <!-- Sage v notch (lighter sage on dark bg) -->
    <path d="M 270 44 L 290 80 L 310 44 L 304 44 L 290 70 L 276 44 Z" fill="#8FA68A"/>
    <text x="312" y="80" font-size="64">e</text>
    <text x="349" y="80" font-size="64">n</text>
  </g>

  <!-- ADVISORY designator — centred -->
  <text x="300" y="115"
        text-anchor="middle"
        font-family="Calibri, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="11"
        fill="#8FA68A"
        letter-spacing="3.52">A D V I S O R Y</text>
</svg>
