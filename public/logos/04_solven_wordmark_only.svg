<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" role="img" aria-label="Solven">
  <title>Solven — Wordmark Only</title>
  <desc>The Solven wordmark in isolation: Georgia serif, charcoal letters with a sage v notch.</desc>

  <g font-family="Georgia, 'Times New Roman', serif" font-weight="400" fill="#2A2A28">
    <text x="10" y="60" font-size="56">S</text>
    <text x="44" y="60" font-size="56">o</text>
    <text x="78" y="60" font-size="56">l</text>
    <!-- Sage v notch -->
    <path d="M 96 27 L 113 60 L 130 27 L 125 27 L 113 51 L 101 27 Z" fill="#6B8068"/>
    <text x="132" y="60" font-size="56">e</text>
    <text x="164" y="60" font-size="56">n</text>
  </g>
</svg>
